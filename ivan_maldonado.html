<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ivan maldonado - AL7 PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <!-- POSICION OVERLAY -->
    <img src="assets/positions/mcd.png" class="position-overlay" alt="MCD">

    <!-- HEADER -->
    <div class="player-header">
        <div class="rating">72</div>
        <img src="assets/photos/ivan_maldonado.jpg" class="player-photo" alt="Ivan maldonado">
    </div>

    <!-- NACIONALIDAD -->
    <div class="nationality">
        <div class="country-code">CL</div>
        <img src="assets/flags/cl.png" class="flag-img">
    </div>

    <!-- INFO -->
    <div class="player-info">
        <div class="player-name">Ivan maldonado</div>
        <div class="player-meta">
            39 años | 170 cm | 66 kg
        </div>
        <div class="player-meta">
            MCD | Pie der
        </div>
    </div>

    <!-- LOGOS EQUIPOS -->
    <div class="teams-container">
        
        <img src="assets/logos/35.png"
             class="team-logo">
        
    </div>

    <!-- ICONOS EXTRA -->
    <div class="player-icons">
        <div class="icon-box">
            <img src="assets/foot/der.png" class="small-icon">
            <div class="icon-label">der</div>
        </div>

        <div class="icon-box">
            <img src="assets/positions/mcd.png" class="small-icon">
            <div class="icon-label">Zona</div>
        </div>
    </div>

    <!-- RADAR -->
    <div class="radar-container">
        <canvas id="radarChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('radarChart');

new Chart(ctx, {
    type: 'radar',
    data: {
        labels: ["PAC","SHO","PAS","DRI","DEF","PHY",],
        datasets: [{
            data: [60,60,75,70,85,85,],
            fill: true
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: {
            r: { beginAtZero: true, max: 100 }
        }
    }
});
</script>

</body>
</html>
