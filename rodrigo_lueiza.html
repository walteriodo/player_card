<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodrigo lueiza - AL7 PRO</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="page-wrapper">

    <div class="card" id="playerCard">

        <!-- POSICION OVERLAY -->
        <img src="assets/positions/dfc.png" class="position-overlay" alt="DFC">

        <!-- HEADER -->
        <div class="player-header">
            <div class="rating">66</div>
            <img src="assets/photos/rodrigo_lueiza.jpg" class="player-photo" alt="Rodrigo lueiza">
        </div>

        <!-- NACIONALIDAD -->
        <div class="nationality">
            <div class="country-code">CL</div>
            <img src="assets/flags/cl.png" class="flag-img" alt="CL">
        </div>

        <!-- INFO -->
        <div class="player-info">
            <div class="player-name">Rodrigo lueiza</div>
            <div class="player-meta">
                31 años | 178 cm | 76 kg
            </div>
            <div class="player-meta">
                DFC | Pie der
            </div>
        </div>

        <!-- LOGOS EQUIPOS -->
        <div class="teams-container">
            
            <img
                src="assets/logos/30.png"
                class="team-logo"
                alt="30"
            >
            
        </div>

        <!-- ICONOS EXTRA -->
        <div class="player-icons">
            <div class="icon-box">
                <img src="assets/foot/der.png" class="small-icon" alt="der">
                <div class="icon-label">der</div>
            </div>

            <div class="icon-box">
                <img src="assets/positions/dfc.png" class="small-icon" alt="DFC">
                <div class="icon-label">Zona</div>
            </div>
        </div>

        <!-- RADAR -->
        <div class="radar-container">
            <canvas id="radarChart"></canvas>
        </div>

    </div>

    <!-- SHARE ACTIONS -->
    <div class="share-actions">
        <button class="action-btn" onclick="downloadCard()">Descargar mi ficha</button>
        <button class="action-btn secondary" onclick="shareCard()">Compartir mi ficha</button>
        <p class="share-help">
            Descarga tu ficha y súbela a tu historia de Instagram etiquetando a AL7.
        </p>
    </div>

</div>

<script>
const ctx = document.getElementById('radarChart');

new Chart(ctx, {
    type: 'radar',
    data: {
        labels: ["PAC", "SHO", "PAS", "DRI", "DEF", "PHY"],
        datasets: [{
            data: [55, 50, 60, 55, 85, 88],
            fill: true,
            backgroundColor: 'rgba(34, 197, 94, 0.20)',
            borderColor: 'rgba(34, 197, 94, 1)',
            pointBackgroundColor: 'rgba(34, 197, 94, 1)',
            pointBorderColor: '#ffffff',
            pointHoverBackgroundColor: '#ffffff',
            pointHoverBorderColor: 'rgba(34, 197, 94, 1)'
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false }
        },
        scales: {
            r: {
                beginAtZero: true,
                min: 0,
                max: 100,
                ticks: {
                    stepSize: 20,
                    backdropColor: 'transparent',
                    color: '#bfbfbf'
                },
                grid: {
                    color: 'rgba(255,255,255,0.12)'
                },
                angleLines: {
                    color: 'rgba(255,255,255,0.12)'
                },
                pointLabels: {
                    color: '#ffffff',
                    font: {
                        size: 12
                    }
                }
            }
        }
    }
});

async function generateCardBlob() {
    const card = document.getElementById('playerCard');

    const canvas = await html2canvas(card, {
        backgroundColor: null,
        scale: 2,
        useCORS: true
    });

    return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), 'image/png');
    });
}

async function downloadCard() {
    try {
        const blob = await generateCardBlob();
        const url = URL.createObjectURL(blob);

        const playerName = (document.querySelector('.player-name')?.innerText || 'ficha_jugador')
            .toLowerCase()
            .trim()
            .replace(/\s+/g, '_');

        const a = document.createElement('a');
        a.href = url;
        a.download = `${playerName}.png`;
        document.body.appendChild(a);
        a.click();
        a.remove();

        URL.revokeObjectURL(url);
    } catch (err) {
        console.error(err);
        alert('No se pudo descargar la ficha.');
    }
}

async function shareCard() {
    try {
        const blob = await generateCardBlob();
        const playerName = (document.querySelector('.player-name')?.innerText || 'ficha_jugador')
            .toLowerCase()
            .trim()
            .replace(/\s+/g, '_');

        const file = new File([blob], `${playerName}.png`, { type: 'image/png' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
                title: 'Mi ficha AL7',
                text: 'Mira mi ficha de jugador en AL7 ⚽',
                files: [file]
            });
            return;
        }

        if (navigator.share) {
            await navigator.share({
                title: 'Mi ficha AL7',
                text: 'Mira mi ficha de jugador en AL7 ⚽',
                url: window.location.href
            });
            return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(window.location.href);
            alert('Tu navegador no permite compartir directamente. Se copió el link de la ficha.');
            return;
        }

        alert('Tu navegador no permite compartir directamente.');
    } catch (err) {
        console.error(err);
    }
}
</script>

</body>
</html>
