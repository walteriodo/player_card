<style>
.premium-carousel {
  position: relative;
  width: 100%;
  height: 190px;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.fade-slide {
  position: absolute;
  opacity: 0;
  transition: opacity 1.2s ease-in-out;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.fade-slide a {
  display: flex;
  align-items: center;
  justify-content: center;
}

.fade-slide img {
  max-width: 220px;
  max-height: 120px;
  object-fit: contain;
  transition: all 0.4s ease;
  cursor: pointer;
}

.fade-slide img:hover {
  transform: scale(1.06);
  filter: brightness(1.05);
}

.fade-slide.active {
  opacity: 1;
}

/* Responsive */
@media (max-width: 768px) {
  .premium-carousel {
    height: 150px;
  }

  .fade-slide img {
    max-width: 160px;
  }
}
</style>

<script>
let slides = document.querySelectorAll(".fade-slide");
let current = 0;

function showNextSlide() {
  slides[current].classList.remove("active");
  current = (current + 1) % slides.length;
  slides[current].classList.add("active");
}

setInterval(showNextSlide, 3500);
</script>
