<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ademir palominos - AL7</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="page-wrapper">

<div class="card" id="playerCard">

<!-- POSICION -->
<img src="assets/positions/mc.png" class="position-overlay">

<!-- HEADER -->
<div class="player-header">

<div class="rating">76</div>

<div class="player-photo-wrapper">
<img src="assets/photos/ademir_palominos.jpg" class="player-photo">
</div>

</div>

<!-- NACIONALIDAD -->

<div class="nationality">

<div class="country-code">CL</div>

<img src="assets/flags/cl.png" class="flag-img">

</div>

<!-- INFO -->

<div class="player-info">

<div class="player-name">Ademir palominos</div>

<div class="player-meta">

43 años | 178 cm | 79 kg

</div>

<div class="player-meta">

MC | Pie amb

</div>

</div>

<!-- EQUIPOS -->

<div class="teams-container">



<img
src="assets/logos/30.png"
class="team-logo">



<img
src="assets/logos/35.png"
class="team-logo">



</div>

<!-- ICONOS -->

<div class="player-icons">

<div class="icon-box">

<img src="assets/foot/amb.png" class="small-icon">

<div class="icon-label">amb</div>

</div>

<div class="icon-box">

<img src="assets/positions/mc.png" class="small-icon">

<div class="icon-label">Zona</div>

</div>

</div>

<!-- RADAR -->

<div class="radar-container">

<canvas id="radarChart"></canvas>

</div>

</div>


<!-- BOTONES -->

<div class="share-actions">

<button class="action-btn" onclick="downloadCard()">Descargar mi ficha</button>

<button class="action-btn secondary" onclick="shareCard()">Compartir mi ficha</button>

<p class="share-help">

Descarga tu ficha y súbela a tu historia de Instagram etiquetando a AL7.

</p>

</div>

</div>


<script>

const ctx = document.getElementById('radarChart');

new Chart(ctx, {

type: 'radar',

data: {

labels: ["PAC", "SHO", "PAS", "DRI", "DEF", "PHY"],

datasets: [{

data: [70, 70, 80, 78, 75, 80],

fill: true,

backgroundColor: 'rgba(34,197,94,0.25)',

borderColor: 'rgba(34,197,94,1)',

pointBackgroundColor: '#22c55e'

}]

},

options: {

plugins:{legend:{display:false}},

scales:{

r:{

beginAtZero:true,

max:100

}

}

}

});

async function generateCardBlob(){

const card=document.getElementById('playerCard');

const canvas=await html2canvas(card,{scale:2,useCORS:true});

return new Promise(resolve=>{

canvas.toBlob(blob=>resolve(blob),'image/png');

});

}

async function downloadCard(){

const blob=await generateCardBlob();

const url=URL.createObjectURL(blob);

const player=document.querySelector('.player-name').innerText.toLowerCase().replace(/\s+/g,'_');

const a=document.createElement('a');

a.href=url;

a.download=player+'.png';

document.body.appendChild(a);

a.click();

a.remove();

URL.revokeObjectURL(url);

}

async function shareCard(){

try{

const blob=await generateCardBlob();

const player=document.querySelector('.player-name').innerText.toLowerCase().replace(/\s+/g,'_');

const file=new File([blob],player+'.png',{type:'image/png'});

if(navigator.canShare && navigator.canShare({files:[file]})){

await navigator.share({

title:'Mi ficha AL7',

text:'Mira mi ficha de jugador ⚽',

files:[file]

});

return;

}

if(navigator.share){

await navigator.share({

title:'Mi ficha AL7',

text:'Mira mi ficha de jugador ⚽',

url:window.location.href

});

return;

}

navigator.clipboard.writeText(window.location.href);

alert("Link copiado");

}catch(e){

console.log(e);

}

}

</script>

</body>

</html>
