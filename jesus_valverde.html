<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jesús Valverde - AL7 PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <!-- POSICION OVERLAY -->
    <img src="assets/positions/ed.png" class="position-overlay" alt="ED">

    <!-- HEADER -->
    <div class="player-header">
        <div class="rating">76</div>
        <img src="assets/photos/jesus_valverde.jpg" class="player-photo" alt="Jesús Valverde">
    </div>

    <!-- NACIONALIDAD -->
    <div class="nationality">
        <div class="country-code">CL</div>
        <img src="assets/flags/cl.png" class="flag-img">
    </div>

    <!-- INFO -->
    <div class="player-info">
        <div class="player-name">Jesús Valverde</div>
        <div class="player-meta">
            21 años | 176 cm | 70 kg
        </div>
        <div class="player-meta">
            ED | Pie amb
        </div>
    </div>

    <!-- LOGOS EQUIPOS -->
    <div class="teams-container">
        
    </div>

    <!-- ICONOS EXTRA -->
    <div class="player-icons">
        <div class="icon-box">
            <img src="assets/foot/amb.png" class="small-icon">
            <div class="icon-label">amb</div>
        </div>

        <div class="icon-box">
            <img src="assets/positions/ed.png" class="small-icon">
            <div class="icon-label">Zona</div>
        </div>
    </div>

    <!-- RADAR -->
    <div class="radar-container">
        <canvas id="radarChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('radarChart');

new Chart(ctx, {
    type: 'radar',
    data: {
        labels: ["PAC","SHO","PAS","DRI","DEF","PHY",],
        datasets: [{
            data: [90,80,75,88,50,70,],
            fill: true
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: {
            r: { beginAtZero: true, max: 100 }
        }
    }
});
</script>

</body>
</html>
